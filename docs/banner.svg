<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0720"/>
      <stop offset="40%" stop-color="#1A0B3E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Deep dark background -->
  <rect width="1200" height="300" fill="url(#g1)"/>

  <!-- Diagonal slash — the bold cut -->
  <polygon points="680,0 780,0 1200,300 1100,300" fill="#7C3AED" opacity="0.06"/>
  <polygon points="750,0 760,0 1200,280 1200,300 1190,300" fill="#06B6D4" opacity="0.04"/>

  <!-- Top gradient line -->
  <rect x="0" y="0" width="600" height="3" fill="url(#g2)"/>

  <!-- Title block -->
  <text x="60" y="90" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-2.5">visionary</text>
  <text x="60" y="118" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280" letter-spacing="0.5">Design intelligence for Claude Code</text>

  <!-- Gradient divider -->
  <rect x="60" y="134" width="120" height="2" fill="url(#g2)"/>

  <!-- Stats row — gradient numbers -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="60" y="190" font-size="36" font-weight="700" fill="url(#g3)">186</text>
    <text x="60" y="208" font-size="9" font-weight="600" fill="#4B5563" letter-spacing="1.5">STYLES</text>

    <text x="180" y="190" font-size="36" font-weight="700" fill="url(#g3)">8</text>
    <text x="180" y="208" font-size="9" font-weight="600" fill="#4B5563" letter-spacing="1.5">STEPS</text>

    <text x="250" y="190" font-size="36" font-weight="700" fill="url(#g3)">15</text>
    <text x="250" y="208" font-size="9" font-weight="600" fill="#4B5563" letter-spacing="1.5">STACKS</text>

    <text x="340" y="190" font-size="36" font-weight="700" fill="url(#g3)">20+</text>
    <text x="340" y="208" font-size="9" font-weight="600" fill="#4B5563" letter-spacing="1.5">LANGS</text>

    <text x="450" y="190" font-size="36" font-weight="700" fill="url(#g3)">AA</text>
    <text x="450" y="208" font-size="9" font-weight="600" fill="#4B5563" letter-spacing="1.5">WCAG 2.2</text>
  </g>

  <!-- Right side: feature stack -->
  <g transform="translate(700, 50)" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="500">
    <g transform="translate(0, 0)">
      <rect width="6" height="6" fill="#7C3AED" rx="1" y="4"/>
      <text x="16" y="12" fill="#9CA3AF">Anti-default bias blocks generic AI output</text>
    </g>
    <g transform="translate(0, 30)">
      <rect width="6" height="6" fill="#6366F1" rx="1" y="4"/>
      <text x="16" y="12" fill="#9CA3AF">Weighted random — same prompt, different results</text>
    </g>
    <g transform="translate(0, 60)">
      <rect width="6" height="6" fill="#3B82F6" rx="1" y="4"/>
      <text x="16" y="12" fill="#9CA3AF">Spring token motion system via motion/react</text>
    </g>
    <g transform="translate(0, 90)">
      <rect width="6" height="6" fill="#06B6D4" rx="1" y="4"/>
      <text x="16" y="12" fill="#9CA3AF">Playwright critique loop — screenshot, score, fix</text>
    </g>
    <g transform="translate(0, 120)">
      <rect width="6" height="6" fill="#22D3EE" rx="1" y="4"/>
      <text x="16" y="12" fill="#9CA3AF">Cross-session taste calibration via system.md</text>
    </g>
    <g transform="translate(0, 150)">
      <rect width="6" height="6" fill="#67E8F9" rx="1" y="4"/>
      <text x="16" y="12" fill="#9CA3AF">WCAG 2.2 AA — EU Accessibility Act compliant</text>
    </g>
  </g>

  <!-- Bottom -->
  <text x="60" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">by GIT Webb &amp; App Studio AB</text>
  <text x="60" y="286" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="400" fill="#1F2937">Apache 2.0 — Free &amp; open source</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="297" width="400" height="3" fill="url(#g2)"/>
</svg>
