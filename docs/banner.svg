<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#7C3AED" stroke-width="0.5">
    <line x1="0" y1="64" x2="1200" y2="64"/>
    <line x1="0" y1="128" x2="1200" y2="128"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="256" x2="1200" y2="256"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- Glow orb top-right -->
  <circle cx="1050" cy="80" r="180" fill="#7C3AED" opacity="0.06"/>
  <circle cx="150" cy="260" r="140" fill="#06B6D4" opacity="0.04"/>

  <!-- Accent line top -->
  <rect x="60" y="0" width="400" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Logo mark: geometric V -->
  <g transform="translate(60, 60)">
    <!-- V shape built from lines -->
    <polygon points="0,0 18,0 40,56 62,0 80,0 48,72 32,72" fill="url(#accent)"/>
    <!-- Dot -->
    <circle cx="40" cy="84" r="4" fill="#06B6D4"/>
  </g>

  <!-- Title -->
  <text x="160" y="105" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#F5F5F5" letter-spacing="-2">visionary</text>

  <!-- Subtitle line -->
  <text x="160" y="140" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#71717A" letter-spacing="0.5">Design intelligence for Claude Code</text>

  <!-- Divider -->
  <rect x="160" y="160" width="48" height="2" fill="#7C3AED" rx="1"/>

  <!-- Stats row -->
  <g transform="translate(160, 190)" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <!-- 186 -->
    <text x="0" y="0" font-size="32" font-weight="700" fill="#A78BFA">186</text>
    <text x="0" y="20" font-size="11" font-weight="500" fill="#52525B" letter-spacing="1">STYLES</text>

    <!-- 8 -->
    <text x="120" y="0" font-size="32" font-weight="700" fill="#818CF8">8</text>
    <text x="120" y="20" font-size="11" font-weight="500" fill="#52525B" letter-spacing="1">STEPS</text>

    <!-- 15 -->
    <text x="210" y="0" font-size="32" font-weight="700" fill="#6366F1">15</text>
    <text x="210" y="20" font-size="11" font-weight="500" fill="#52525B" letter-spacing="1">STACKS</text>

    <!-- 20+ -->
    <text x="320" y="0" font-size="32" font-weight="700" fill="#22D3EE">20+</text>
    <text x="320" y="20" font-size="11" font-weight="500" fill="#52525B" letter-spacing="1">LANGUAGES</text>

    <!-- WCAG -->
    <text x="460" y="0" font-size="32" font-weight="700" fill="#06B6D4">AA</text>
    <text x="460" y="20" font-size="11" font-weight="500" fill="#52525B" letter-spacing="1">WCAG 2.2</text>
  </g>

  <!-- Right side: style category pills -->
  <g transform="translate(700, 60)" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="500">
    <rect x="0" y="0" width="110" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="12" y="17" fill="#A78BFA">Morphisms</text>

    <rect x="120" y="0" width="140" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="132" y="17" fill="#818CF8">Internet Aesthetics</text>

    <rect x="270" y="0" width="100" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="282" y="17" fill="#6366F1">Historical</text>

    <rect x="380" y="0" width="110" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="392" y="17" fill="#22D3EE">Typography</text>

    <rect x="0" y="36" width="90" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="12" y="53" fill="#A78BFA">Industry</text>

    <rect x="100" y="36" width="100" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="112" y="53" fill="#818CF8">Emotional</text>

    <rect x="210" y="36" width="80" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="222" y="53" fill="#6366F1">Material</text>

    <rect x="300" y="36" width="80" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="312" y="53" fill="#22D3EE">Futurist</text>

    <rect x="390" y="36" width="80" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="402" y="53" fill="#A78BFA">Cultural</text>

    <rect x="0" y="72" width="80" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="12" y="89" fill="#818CF8">Hybrid</text>

    <rect x="90" y="72" width="90" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="102" y="89" fill="#6366F1">Extended</text>

    <rect x="190" y="72" width="120" height="26" rx="3" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="202" y="89" fill="#22D3EE">Contemporary</text>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(60, 280)" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="0" y="14" font-size="12" font-weight="400" fill="#52525B">by GIT Webb &amp; App Studio AB</text>
    <text x="680" y="14" font-size="11" font-weight="500" fill="#3F3F46">Apache 2.0</text>
    <text x="780" y="14" font-size="11" font-weight="500" fill="#3F3F46">Motion-first</text>
    <text x="880" y="14" font-size="11" font-weight="500" fill="#3F3F46">No Python</text>
    <text x="970" y="14" font-size="11" font-weight="500" fill="#3F3F46">WCAG 2.2 AA</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="60" y="317" width="300" height="3" fill="url(#accent)" rx="1.5"/>
</svg>
